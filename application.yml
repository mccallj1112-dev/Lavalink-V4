server:
  port: ${PORT:2333}
  address: 0.0.0.0

lavalink:
  server:
    password: ${LAVALINK_PASSWORD:youshallnotpass}

    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      rotation: true
      distortion: true
      channelMix: true
      lowPass: true

    bufferDurationMs: 400
    frameBufferDurationMs: 5000

    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5

    gc-warnings: true

metrics:
  prometheus:
    enabled: false

logging:
  level:
    root: INFO
    lavalink: INFO

plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.13.5"  # Check latest version at https://github.com/lavalink-devs/youtube-source/releases
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.0"  # Check latest version at https://github.com/topi314/LavaSrc/releases
      snapshot: false

lavasrc:
  providers:
    - "ytsearch:%ISRC%"
    - "ytsearch:%QUERY%"
    - "ytmsearch:%QUERY%"

  sources:
    spotify: true
    deezer: true
    applemusic: true
    yandexmusic: false

  spotify:
    clientId: "YOUR_SPOTIFY_CLIENT_ID"
    clientSecret: "YOUR_SPOTIFY_CLIENT_SECRET"
    countryCode: "IN"
