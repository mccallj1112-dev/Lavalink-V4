server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    # YouTube Source Plugin — REQUIRED for LavaSearch YouTube support
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.4"
      snapshot: false
    # LavaSrc — Spotify, Deezer, Yandex Music
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.3.0"
      snapshot: false
    # LavaSearch — enhanced search
    - dependency: "com.github.topi314.lavasearch:lavasearch-plugin:1.0.0"
      snapshot: false
    # SponsorBlock — skip YouTube sponsors
    - dependency: "com.github.topi314.sponsorblock:sponsorblock-plugin:3.0.1"
      snapshot: false

  server:
    password: ${LAVALINK_PASSWORD:"youshallnotpass"}

    sources:
      # Built-in sources
      youtube:    false   # disabled — using youtube-plugin instead (more stable)
      bandcamp:   true
      soundcloud: true
      twitch:     true
      vimeo:      true
      http:       true
      local:      false

    filters:
      volume:      true
      equalizer:   true
      karaoke:     true
      timescale:   true
      tremolo:     true
      vibrato:     true
      rotation:    true
      distortion:  true
      channelMix:  true
      lowPass:     true

    bufferDurationMs:      400
    frameBufferDurationMs: 5000
    opusEncodingQuality:   10
    resamplingQuality:     HIGH
    trackStuckThresholdMs: 10000
    useSeekGhosting:       true
    playerUpdateInterval:  5
    youtubeSearchEnabled:  false   # handled by youtube-plugin now

plugins:
  # ── YouTube Source Plugin config ──────────────────────────────────────────
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_TESTSUITE
      - WEB
      - TVHTML5EMBEDDED

  # ── LavaSrc ───────────────────────────────────────────────────────────────
  lavasrc:
    providers:
      - 'dzisrc:%ISRC%'
      - 'dzsearch:%QUERY%'
      - 'ytsearch:%QUERY%'
      - 'ytmsearch:%QUERY%'
    sources:
      spotify:      true
      appleMusic:   false   # needs paid Apple Developer token — disabled
      deezer:       true
      yandexMusic:  false   # disabled unless you have a token
      youtube:      true

    spotify:
      clientId:     ${SPOTIFY_CLIENT_ID:""}
      clientSecret: ${SPOTIFY_CLIENT_SECRET:""}
      countryCode:  "US"
      playlistLoadLimit: 6
      albumLoadLimit:    6

    deezer:
      masterDecryptionKey: ${DEEZER_MASTER_KEY:""}

  # ── LavaSearch ────────────────────────────────────────────────────────────
  lavasearch:
    sources:
      youtube:      true
      youtubeMusic: true
      soundcloud:   true
      spotify:      true
      deezer:       true

  # ── SponsorBlock ──────────────────────────────────────────────────────────
  sponsorblock:
    categories:
      - sponsor
      - selfpromo

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/lavalink.log
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: false
  logback:
    rollingpolicy:
      max-file-size: 1GB
      max-history: 30
