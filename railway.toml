[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# NO healthcheckPath — Railway checks port availability instead.
# Lavalink needs 60-90s to download plugins on first boot.
# A path-based health check times out before Lavalink is ready.
numReplicas = 1
